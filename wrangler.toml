name = "cnzrfrmwrkweb"
compatibility_date = "2024-12-23"

# This tells Wrangler to upload your built frontend files
[assets]
directory = "./dist" 

# Environment variables
[vars]
NODE_ENV = "production"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
